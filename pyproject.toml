[dependency-groups]
dev = [
    "PdbEditorSupport",
    { include-group = "docs" },
    { include-group = "mypy" },
    { include-group = "pytest" },
    { include-group = "release" },
]
docs = [
    "Sphinx",
    "furo",
    "mr.laforge",
    "regendoc",
    "supervisor",
    "tox",
    "virtualenv",
]
lint = [
    "flake8",
    "lint-roller",
    "ruff",
    "zizmor",
]
mypy = [
    "mypy",
    "mypy-zope>=1.0.5",
    "types-WebOb",
    "types-beautifulsoup4",
    "types-defusedxml",
    "types-passlib",
    "types-requests",
    "types-urllib3",
    "types-waitress",
]
pytest = [
    "beautifulsoup4 != 4.12.1",
    "certauth",
    "execnet",
    "mock",
    "pip",
    "pypitoken; python_version < '3.15'",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pytest-icdiff",
    "pytest-instafail",
    "pytest-pdb",
    "pytest-sugar",
    "pytest-timeout",
    "tox",
    "webtest",
]
release = [
    "keyring",
    "setuptools_changelog_shortener",
    "towncrier>=21.9.0",
    "wheel",
]


[tool.lint-roller]
projects = [
    ".ci",
    "client",
    "common",
    "debugging",
    "postgresql",
    "server",
    "web",
]
start-rev = "origin/main"


[tool.ruff]
extend = "ruff-strict.toml"
