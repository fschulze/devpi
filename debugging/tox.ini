[tox]
envlist=flake8,py311,py314


[testenv]
commands =
    py.test {posargs}

passenv =
    GITHUB_ACTIONS
    LANG
setenv =
    CHAMELEON_CACHE = {envtmpdir}

deps =
    pytest
    pytest-github-actions-annotate-failures!=0.3.0
    webtest


[testenv:flake8]
commands = flake8 --config .flake8
deps = flake8
skip_install = true


[testenv:mypy]
commands = mypy {posargs}
deps =
    mypy
    mypy-zope
