[mypy]
files =
    client/devpi/**.py,
    client/testing/**.py,
    common/devpi_common/**.py,
    common/testing/**.py,
    postgresql/devpi_postgresql/**.py,
    postgresql/pytest_devpi_postgresql/**.py,
    server/devpi_server/**.py,
    server/pytest_devpi_server/**.py,
    server/test_devpi_server/**.py,
    web/devpi_web/**.py,
    web/tests/test**.py
namespace_packages = True
plugins = mypy_zope:plugin
show_error_codes = True
warn_unused_configs = True
warn_unused_ignores = True
warn_unreachable = True

# step 1: add types to functions
# step 2: check_untyped_defs = True and disallow_incomplete_defs = True
# step 3: disallow_untyped_defs = True

[mypy-argcomplete.*]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-certauth.*]
ignore_missing_imports = True

[mypy-chameleon.*]
ignore_missing_imports = True

[mypy-check_manifest.*]
ignore_missing_imports = True

[mypy-colorama.*]
ignore_missing_imports = True

[mypy-defusedxml.*]
ignore_missing_imports = True

[mypy-devpi_common.*]
check_untyped_defs = True
disallow_incomplete_defs = True

